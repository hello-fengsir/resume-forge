# Resume Forge — 简历内容生成器
# 端口: frontend 8093, backend 8017, database 5434

services:
  database:
    image: pgvector/pgvector:pg16
    container_name: resume-forge-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: resume_forge
      POSTGRES_USER: resume
      POSTGRES_PASSWORD: ${DB_PASSWORD:-resume-forge-2026}
    volumes:
      - resume_forge_db:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5434:5432"
    networks:
      - resume-forge-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resume -d resume_forge"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    container_name: resume-forge-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://resume:${DB_PASSWORD:-resume-forge-2026}@database:5432/resume_forge
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      REVIEW_MODEL: ${REVIEW_MODEL:-deepseek-v4-pro}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-CHANGE_ME_GENERATE_NEW_KEY}
      GENERATE_MODEL: ${GENERATE_MODEL:-deepseek-v4-pro}
    volumes:
      - ./backend/app:/app/app:ro
      - resume_forge_uploads:/app/uploads
      - ./data:/app/data
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "127.0.0.1:8017:8000"
    networks:
      - resume-forge-net

  frontend:
    build: ./frontend
    container_name: resume-forge-frontend
    restart: unless-stopped
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    ports:
      - "8093:80"
    networks:
      - resume-forge-net

volumes:
  resume_forge_db:
  resume_forge_uploads:

networks:
  resume-forge-net:
    driver: bridge
