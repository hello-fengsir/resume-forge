name: Feishu Notify

on:
  issues:
    types: [opened]
  release:
    types: [published]
  pull_request:
    types: [opened]
  star:
    types: [created]
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Detect event type
        id: event
        run: |
          if [ "${{ github.event_name }}" = "issues" ]; then
            echo "type=🔔 新 Issue" >> $GITHUB_OUTPUT
            echo "title=#${{ github.event.issue.number }} ${{ github.event.issue.title }}" >> $GITHUB_OUTPUT
            echo "author=${{ github.event.issue.user.login }}" >> $GITHUB_OUTPUT
            echo "url=${{ github.event.issue.html_url }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "release" ]; then
            echo "type=🚀 新版本发布" >> $GITHUB_OUTPUT
            echo "title=${{ github.event.release.tag_name }} - ${{ github.event.release.name }}" >> $GITHUB_OUTPUT
            echo "author=${{ github.event.release.author.login }}" >> $GITHUB_OUTPUT
            echo "url=${{ github.event.release.html_url }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "type=🔀 新 PR" >> $GITHUB_OUTPUT
            echo "title=#${{ github.event.pull_request.number }} ${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT
            echo "author=${{ github.event.pull_request.user.login }}" >> $GITHUB_OUTPUT
            echo "url=${{ github.event.pull_request.html_url }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "star" ]; then
            echo "type=⭐ 新 Star" >> $GITHUB_OUTPUT
            echo "title=${{ github.event.repository.name }} 获得了新 Star！" >> $GITHUB_OUTPUT
            echo "author=${{ github.event.sender.login }}" >> $GITHUB_OUTPUT
            echo "url=${{ github.event.repository.html_url }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "type=📦 代码更新" >> $GITHUB_OUTPUT
            COMMIT_MSG=$(echo '${{ github.event.head_commit.message }}' | head -1)
            echo "title=\${COMMIT_MSG}" >> $GITHUB_OUTPUT
            echo "author=${{ github.event.head_commit.author.name }}" >> $GITHUB_OUTPUT
            echo "url=${{ github.event.head_commit.url }}" >> $GITHUB_OUTPUT
          fi

      - name: Send to Feishu
        run: |
          curl -s -X POST "https://open.feishu.cn/open-apis/bot/v2/hook/ce3e2c30-4176-4f51-9051-b96399858e81" \
            -H "Content-Type: application/json" \
            -d '{
              "msg_type": "interactive",
              "card": {
                "header": {
                  "title": {"tag": "plain_text", "content": "${{ steps.event.outputs.type }}"},
                  "template": "blue"
                },
                "elements": [
                  {
                    "tag": "div",
                    "text": {
                      "tag": "lark_md",
                      "content": "**仓库：** ${{ github.repository }}\n**标题：** ${{ steps.event.outputs.title }}\n**作者：** ${{ steps.event.outputs.author }}\n**链接：** [点击查看](${{ steps.event.outputs.url }})"
                    }
                  }
                ]
              }
            }'
