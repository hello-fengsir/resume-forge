name: Feishu Notify

on:
  issues:
    types: [opened]
  release:
    types: [published]
  pull_request:
    types: [opened]
  star:
    types: [created]
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send to Feishu
        env:
          FEISHU_WEBHOOK: "https://open.feishu.cn/open-apis/bot/v2/hook/ce3e2c30-4176-4f51-9051-b96399858e81"
          EVENT_NAME: ${{ github.event_name }}
          REPO_NAME: ${{ github.repository }}
          REPO_URL: ${{ github.event.repository.html_url }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_AUTHOR: ${{ github.event.release.author.login }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          STAR_SENDER: ${{ github.event.sender.login }}
          PUSH_AUTHOR: ${{ github.event.head_commit.author.name }}
          PUSH_URL: ${{ github.event.head_commit.url }}
          PUSH_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          # Detect event type
          if [ "$EVENT_NAME" = "issues" ]; then
            TYPE="🔔 新 Issue"
            TITLE="#${ISSUE_NUMBER} ${ISSUE_TITLE}"
            AUTHOR="${ISSUE_AUTHOR}"
            URL="${ISSUE_URL}"
          elif [ "$EVENT_NAME" = "release" ]; then
            TYPE="🚀 新版本发布"
            TITLE="${RELEASE_TAG} - ${RELEASE_NAME}"
            AUTHOR="${RELEASE_AUTHOR}"
            URL="${RELEASE_URL}"
          elif [ "$EVENT_NAME" = "pull_request" ]; then
            TYPE="🔀 新 PR"
            TITLE="#${PR_NUMBER} ${PR_TITLE}"
            AUTHOR="${PR_AUTHOR}"
            URL="${PR_URL}"
          elif [ "$EVENT_NAME" = "star" ]; then
            TYPE="⭐ 新 Star"
            TITLE="${REPO_NAME} 获得了新 Star！"
            AUTHOR="${STAR_SENDER}"
            URL="${REPO_URL}"
          elif [ "$EVENT_NAME" = "push" ]; then
            TYPE="📦 代码更新"
            TITLE=$(echo "$PUSH_MESSAGE" | head -1)
            AUTHOR="${PUSH_AUTHOR}"
            URL="${PUSH_URL}"
          fi

          # Build card JSON safely with jq
          jq -n \
            --arg type "$TYPE" \
            --arg repo "$REPO_NAME" \
            --arg title "$TITLE" \
            --arg author "$AUTHOR" \
            --arg url "$URL" \
            '{
              msg_type: "interactive",
              card: {
                header: {
                  title: {tag: "plain_text", content: $type},
                  template: "blue"
                },
                elements: [
                  {
                    tag: "div",
                    text: {
                      tag: "lark_md",
                      content: "**仓库：** \($repo)\n**标题：** \($title)\n**作者：** \($author)\n**链接：** [\($title)](\($url))"
                    }
                  }
                ]
              }
            }' | curl -s -X POST "$FEISHU_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d @-
